# CI/CD в Azure DevOps. Триггер — push в main.
# Три стадии: Test -> Build (Docker -> ECR) -> Deploy (ECS).
trigger:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  AWS_REGION: eu-west-1
  ECR_REPO: 123456789012.dkr.ecr.eu-west-1.amazonaws.com/travel-budget-optimizer

stages:
  # ---------- 1. Тесты + покрытие ----------
  - stage: Test
    displayName: Test
    jobs:
      - job: RunTests
        steps:
          - task: Maven@4
            inputs:
              mavenPomFile: pom.xml
              goals: verify          # verify => тесты + гейт JaCoCo 80%
              options: -B
              publishJUnitResults: true
              testResultsFiles: '**/surefire-reports/TEST-*.xml'
              codeCoverageToolOption: JaCoCo
              codeCoverageClassFilesDirectories: target/classes

  # ---------- 2. Сборка Docker-образа и push в ECR ----------
  - stage: Build
    displayName: Build & Push
    dependsOn: Test
    condition: succeeded()
    jobs:
      - job: DockerBuild
        steps:
          # Логинимся в ECR (нужен AWS service connection в Azure DevOps).
          - task: ECRPushImage@1
            inputs:
              awsCredentials: aws-service-connection
              regionName: $(AWS_REGION)
              imageSource: imagename
              sourceImageName: travel-budget-optimizer
              repositoryName: travel-budget-optimizer
              pushTag: $(Build.BuildId)
          # Альтернатива через Docker task:
          - task: Docker@2
            inputs:
              command: buildAndPush
              repository: $(ECR_REPO)
              dockerfile: Dockerfile
              tags: |
                $(Build.BuildId)
                latest

  # ---------- 3. Деплой на ECS ----------
  - stage: Deploy
    displayName: Deploy to ECS
    dependsOn: Build
    condition: succeeded()
    jobs:
      - job: DeployECS
        steps:
          - task: AWSShellScript@1
            inputs:
              awsCredentials: aws-service-connection
              regionName: $(AWS_REGION)
              scriptType: inline
              inlineScript: |
                aws ecs update-service \
                  --cluster travel-cluster \
                  --service travel-budget-service \
                  --force-new-deployment
